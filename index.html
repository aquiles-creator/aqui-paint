<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paint Arena</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#1e1e2f;
  color:white;
  text-align:center;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#560bad;
  color:white;
}

#menu,#charactersMenu,#endScreen{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

canvas{display:none;background:#111;margin:auto;}

.skin{
  margin:10px;
}

.locked{
  opacity:0.4;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>🎨 Paint Arena</h1>
  <p>Monedas: <span id="coins">0</span></p>

  <button onclick="startGame()">Jugar</button>
  <button onclick="openCharacters()">Personaje</button>
</div>

<!-- MENU PERSONAJES -->
<div id="charactersMenu" style="display:none;">
  <h2>Personajes</h2>

  <div id="skinsContainer"></div>

  <button onclick="backMenu()">Volver</button>
</div>

<!-- FIN -->
<div id="endScreen" style="display:none;">
  <h1 id="endText"></h1>
  <button onclick="goMenu()">Menú</button>
</div>

<canvas id="game"></canvas>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let cols=20,rows=20;
canvas.width=cols*25;
canvas.height=rows*25;

// monedas
let coins=parseInt(localStorage.getItem("coins"))||0;
document.getElementById("coins").innerText=coins;

// skins desbloqueadas
let skinsUnlocked=JSON.parse(localStorage.getItem("skins"))||["duende1"];

// personaje actual
let currentSkin=localStorage.getItem("skin")||"duende1";

// cargar imágenes
let images={
  duende1:new Image(),
  duende2:new Image(),
  soldado1:new Image(),
  soldado2:new Image(),
  mago1:new Image(),
  mago2:new Image()
};

images.duende1.src="assets/duende.png";
images.duende2.src="assets/duende_skin2.png";
images.soldado1.src="assets/soldado.png";
images.soldado2.src="assets/soldado_skin2.png";
images.mago1.src="assets/mago.png";
images.mago2.src="assets/mago_skin2.png";

// jugador
let player={x:5,y:5};
let bot={x:10,y:10};

// grid
let grid=[];
for(let i=0;i<cols;i++){
  grid[i]=[];
  for(let j=0;j<rows;j++) grid[i][j]=0;
}

// abrir menú personajes
function openCharacters(){
  document.getElementById("menu").style.display="none";
  document.getElementById("charactersMenu").style.display="flex";

  let c=document.getElementById("skinsContainer");
  c.innerHTML="";

  let skins=["duende1","duende2","soldado1","soldado2","mago1","mago2"];

  skins.forEach(s=>{
    let div=document.createElement("div");
    div.className="skin";

    let img=document.createElement("img");
    img.src=images[s].src;
    img.width=60;

    if(!skinsUnlocked.includes(s)){
      div.classList.add("locked");
      div.innerHTML+="<p>🔒 Bloqueado</p>";
    }else{
      div.onclick=()=>{
        currentSkin=s;
        localStorage.setItem("skin",s);
        alert("Skin seleccionada");
      }
    }

    div.appendChild(img);
    c.appendChild(div);
  });
}

function backMenu(){
  document.getElementById("charactersMenu").style.display="none";
  document.getElementById("menu").style.display="flex";
}

// iniciar juego
function startGame(){
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";
  loop();
}

// pintar
function paint(p,c){
  let x=Math.floor(p.x);
  let y=Math.floor(p.y);
  if(x>=0&&y>=0&&x<cols&&y<rows){
    grid[x][y]=c;
  }
}

// bot simple mejorado
function moveBot(){
  let target={x:Math.random()*cols,y:Math.random()*rows};

  let dx=target.x-bot.x;
  let dy=target.y-bot.y;
  let d=Math.hypot(dx,dy);

  bot.x+=dx/d*0.05;
  bot.y+=dy/d*0.05;

  bot.x=Math.max(0,Math.min(cols-1.01,bot.x));
  bot.y=Math.max(0,Math.min(rows-1.01,bot.y));
}

// dibujar
function draw(){
  for(let i=0;i<cols;i++){
    for(let j=0;j<rows;j++){
      if(grid[i][j]==1) ctx.fillStyle="blue";
      else if(grid[i][j]==2) ctx.fillStyle="red";
      else ctx.fillStyle="#222";
      ctx.fillRect(i*25,j*25,25,25);
    }
  }

  ctx.drawImage(images[currentSkin],player.x*25,player.y*25,25,25);
  ctx.fillStyle="red";
  ctx.fillRect(bot.x*25,bot.y*25,25,25);
}

// loop
function loop(){
  paint(player,1);
  moveBot();
  paint(bot,2);

  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
