<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paint Arena</title>

<style>
html, body {
  margin:0;
  font-family:Arial;
  background:#1e1e2f;
  color:white;
  text-align:center;
  touch-action:none;
  overflow:hidden;
  user-select:none;
}

#menu {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

button {
  padding:12px;
  margin:8px;
  background:#560bad;
  color:white;
  border:none;
  border-radius:10px;
}

canvas {
  display:none;
  margin:auto;
  background:#111;
}

#hud { display:none; }

#joystick {
  position:fixed;
  bottom:20px;
  left:20px;
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}

#ability {
  position:fixed;
  bottom:20px;
  right:20px;
  width:80px;
  height:80px;
  background:#f72585;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

#message {
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:#000a;
  padding:10px 20px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div id="menu">
  <h1>🎨 Paint Arena</h1>
  <p>Monedas: <span id="coins">0</span></p>
  <button onclick="startGame()">Jugar</button>
</div>

<div id="hud">
  <p id="score"></p>
  <p id="mission"></p>
</div>

<div id="message"></div>

<canvas id="game"></canvas>
<div id="joystick"></div>
<div id="ability" onclick="useAbility()">⚡</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let cols=30, rows=30;
canvas.width = cols*20;
canvas.height = rows*20;

// monedas
let coins = parseInt(localStorage.getItem("coins")) || 0;
document.getElementById("coins").innerText = coins;

// mapa
let grid=[];
let obstacles=[];
for(let i=0;i<cols;i++){
  grid[i]=[];
  for(let j=0;j<rows;j++){
    grid[i][j]=0;

    if(Math.random()<0.05){
      obstacles.push({x:i,y:j});
    }
  }
}

// jugador
let player = {x:10,y:10,speed:0.08,power:1};
let bot = {x:5,y:5};

let time=30;
let lastTime=Date.now();

// misión
let missionGoal = 150;

// mensaje
function showMessage(text){
  let m=document.getElementById("message");
  m.innerText=text;
  m.style.display="block";
  setTimeout(()=>m.style.display="none",2000);
}

// iniciar
function startGame(){
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";
  document.getElementById("hud").style.display="block";
  loop();
}

// pintar con efecto
function paint(p,color,power){
  for(let i=-power;i<=power;i++){
    for(let j=-power;j<=power;j++){
      let x=Math.floor(p.x+i);
      let y=Math.floor(p.y+j);

      if(x>=0&&y>=0&&x<cols&&y<rows){

        // evitar obstáculos
        if(obstacles.some(o=>o.x==x&&o.y==y)) continue;

        grid[x][y]=color;

        // efecto visual simple
        ctx.fillStyle = "white";
        ctx.fillRect(x*20,y*20,5,5);
      }
    }
  }
}

// bot mejorado (roba)
function moveBot(){
  let target = null;

  // prioriza zonas del jugador
  for(let i=0;i<cols;i++){
    for(let j=0;j<rows;j++){
      if(grid[i][j]==1){
        target={x:i,y:j};
      }
    }
  }

  if(!target){
    target={x:Math.random()*cols,y:Math.random()*rows};
  }

  if(target.x>bot.x) bot.x+=0.1;
  if(target.x<bot.x) bot.x-=0.1;
  if(target.y>bot.y) bot.y+=0.1;
  if(target.y<bot.y) bot.y-=0.1;
}

// dibujar
function draw(){
  for(let i=0;i<cols;i++){
    for(let j=0;j<rows;j++){

      if(grid[i][j]==1) ctx.fillStyle="#4cc9f0";
      else if(grid[i][j]==2) ctx.fillStyle="#f72585";
      else ctx.fillStyle="#222";

      ctx.fillRect(i*20,j*20,20,20);
    }
  }

  // obstáculos
  ctx.fillStyle="black";
  obstacles.forEach(o=>{
    ctx.fillRect(o.x*20,o.y*20,20,20);
  });

  ctx.fillStyle="lime";
  ctx.fillRect(player.x*20,player.y*20,20,20);

  ctx.fillStyle="red";
  ctx.fillRect(bot.x*20,bot.y*20,20,20);
}

// score
function updateScore(){
  let p1=0,p2=0;

  grid.forEach(col=>{
    col.forEach(c=>{
      if(c==1) p1++;
      if(c==2) p2++;
    });
  });

  document.getElementById("score").innerText =
    "Vos: "+p1+" | Bot: "+p2+" | Tiempo: "+Math.floor(time);

  document.getElementById("mission").innerText =
    "Misión: pinta "+missionGoal;

  if(p1>=missionGoal){
    coins+=100;
    showMessage("🎯 MISIÓN COMPLETADA +100");
  }

  if(time<=0){
    if(p1>p2){
      coins+=50;
      showMessage("🏆 GANASTE +50");
    } else {
      coins+=20;
      showMessage("💀 PERDISTE +20");
    }

    localStorage.setItem("coins",coins);
    setTimeout(()=>location.reload(),1500);
  }
}

// joystick
let joy=document.getElementById("joystick");

joy.addEventListener("touchmove", e=>{
  e.preventDefault();

  let t=e.touches[0];
  let rect=joy.getBoundingClientRect();

  let dx=(t.clientX-rect.left-50)/50;
  let dy=(t.clientY-rect.top-50)/50;

  player.x+=dx*player.speed*2;
  player.y+=dy*player.speed*2;
});

// habilidad mejorada
function useAbility(){
  for(let i=-3;i<=3;i++){
    for(let j=-3;j<=3;j++){
      let x=Math.floor(player.x+i);
      let y=Math.floor(player.y+j);
      if(x>=0&&y>=0&&x<cols&&y<rows){
        grid[x][y]=1;
      }
    }
  }

  showMessage("⚡ Habilidad!");
}

// loop
function loop(){
  let now=Date.now();
  let delta=(now-lastTime)/1000;
  lastTime=now;

  paint(player,1,1);
  moveBot();
  paint(bot,2,1);

  draw();
  updateScore();

  time-=delta;

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
