<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Juego Paint Arena Online Gratis</title>
<meta name="description" content="Juego de pintar zonas estilo arena contra bots">

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #1e1e2f, #7209b7);
  color: white;
}

/* 🎨 PANTALLA INICIAL */
#menu {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #3a0ca3, #f72585);
}

#menu h1 {
  font-size: 40px;
}

#menu img {
  width: 200px;
  margin: 20px;
  border-radius: 20px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  background: #560bad;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

/* 🎮 JUEGO */
canvas {
  display: none;
  margin: auto;
  background: #111;
  border: 2px solid white;
}

#hud {
  display: none;
}
</style>
</head>

<body>

<!-- 🎨 MENU -->
<div id="menu">
  <h1>🎨 Paint Arena</h1>
  
  <!-- IMAGEN DECORATIVA -->
  <img src="https://cdn.pixabay.com/photo/2017/01/31/13/14/fantasy-2029446_960_720.png">

  <p>Pinta más que el bot y gana</p>
  <button onclick="startGame()">Jugar</button>
</div>

<!-- 🎮 HUD -->
<div id="hud">
  <p id="score"></p>
</div>

<!-- 🎮 CANVAS -->
<canvas id="game" width="400" height="400"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let gridSize = 20;
let cols = 20;
let rows = 20;

// mapa
let grid = [];
for (let i=0;i<cols;i++){
  grid[i]=[];
  for (let j=0;j<rows;j++) grid[i][j]=0;
}

// jugador y bot
let player = {x:10,y:10,color:1};
let bot = {x:5,y:5,color:2};

let time = 30;

// iniciar juego
function startGame(){
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";
  document.getElementById("hud").style.display="block";
  loop();
}

// pintar
function paint(p){
  grid[p.x][p.y] = p.color;
}

// bot simple
function moveBot(){
  let dir = Math.floor(Math.random()*4);

  if(dir===0) bot.x++;
  if(dir===1) bot.x--;
  if(dir===2) bot.y++;
  if(dir===3) bot.y--;

  bot.x = Math.max(0, Math.min(cols-1, bot.x));
  bot.y = Math.max(0, Math.min(rows-1, bot.y));
}

// dibujar
function draw(){
  for (let i=0;i<cols;i++){
    for (let j=0;j<rows;j++){
      if(grid[i][j]===1) ctx.fillStyle="#4cc9f0";
      else if(grid[i][j]===2) ctx.fillStyle="#f72585";
      else ctx.fillStyle="#222";

      ctx.fillRect(i*20,j*20,20,20);
    }
  }
}

// puntaje
function score(){
  let p1=0, p2=0;

  grid.forEach(col=>{
    col.forEach(cell=>{
      if(cell===1) p1++;
      if(cell===2) p2++;
    });
  });

  document.getElementById("score").innerText =
    "Vos: "+p1+" | Bot: "+p2+" | Tiempo: "+time;

  if(time<=0){
    if(p1>p2) alert("GANASTE!");
    else alert("PERDISTE!");
    location.reload();
  }
}

// control táctil
document.addEventListener("touchstart", e=>{
  let x = Math.floor(e.touches[0].clientX / 20);
  let y = Math.floor((e.touches[0].clientY-80) / 20);

  player.x = Math.max(0, Math.min(cols-1, x));
  player.y = Math.max(0, Math.min(rows-1, y));
});

// loop
function loop(){
  paint(player);
  moveBot();
  paint(bot);

  draw();
  score();

  time -= 0.05;

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
