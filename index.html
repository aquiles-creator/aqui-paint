<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paint Arena</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#1e1e2f;
  color:white;
  text-align:center;
  overflow:hidden;
  touch-action:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#560bad;
  color:white;
}

#menu,#charactersMenu,#endScreen{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

canvas{display:none;background:#111;margin:auto;}

#joystick{
  position:fixed;
  bottom:20px;
  left:20px;
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}

#ability{
  position:fixed;
  bottom:20px;
  right:20px;
  width:80px;
  height:80px;
  background:#f72585;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.locked{opacity:0.4;}
</style>
</head>

<body>

<div id="menu">
  <h1>🎨 Paint Arena</h1>
  <button onclick="startGame()">Jugar</button>
  <button onclick="openCharacters()">Personaje</button>
  <button onclick="openBox()">Abrir sobre (100 🪙)</button>
  <p>Monedas: <span id="coinsText"></span></p>
</div>

<div id="charactersMenu" style="display:none;">
  <h2>Personajes</h2>
  <div id="skinsContainer"></div>
  <button onclick="backMenu()">⬅ Volver al menú</button>
</div>

<div id="endScreen" style="display:none;">
  <h1 id="endText"></h1>
  <button onclick="location.reload()">Menú</button>
</div>

<canvas id="game"></canvas>
<div id="joystick"></div>
<div id="ability" onclick="useAbility()">⚡</div>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let cols=40,rows=40;
canvas.width=cols*15;
canvas.height=rows*15;

// monedas
let coins=parseInt(localStorage.getItem("coins"))||0;
document.getElementById("coinsText").innerText=coins;

// skins
let skinsUnlocked=JSON.parse(localStorage.getItem("skins"))||["duende1"];
let currentSkin=localStorage.getItem("skin")||"duende1";

// jugador (🔥 movimiento mejorado)
let player={
  x:20,y:20,
  vx:0,vy:0,
  targetVX:0,targetVY:0,
  speed:0.2
};

let bot={x:10,y:10};

// grid
let grid=[];
for(let i=0;i<cols;i++){
  grid[i]=[];
  for(let j=0;j<rows;j++) grid[i][j]=0;
}

let time=40;
let playing=false;
let lastTime=Date.now();
let abilityCD=0;

// 🎮 MENÚ PERSONAJES
function openCharacters(){
  document.getElementById("menu").style.display="none";
  document.getElementById("charactersMenu").style.display="flex";

  let c=document.getElementById("skinsContainer");
  c.innerHTML="";

  let skins=["duende1","duende2","soldado1","soldado2","mago1","mago2"];

  skins.forEach(s=>{
    let div=document.createElement("div");

    let emoji="❓";
    if(s.includes("duende")) emoji="👺";
    if(s.includes("soldado")) emoji="🪖";
    if(s.includes("mago")) emoji="🧙";

    div.innerHTML=`<div style="font-size:40px">${emoji}</div>`;

    if(!skinsUnlocked.includes(s)){
      div.classList.add("locked");
      div.innerHTML+="🔒";
    }else{
      div.onclick=()=>{
        currentSkin=s;
        localStorage.setItem("skin",s);
      }
    }

    c.appendChild(div);
  });
}

function backMenu(){
  document.getElementById("charactersMenu").style.display="none";
  document.getElementById("menu").style.display="flex";
}

// 🎁 SOBRES
function openBox(){
  if(coins<100){
    alert("No tienes monedas");
    return;
  }

  coins-=100;

  let r=Math.random();

  if(r<0.6){
    let reward=Math.floor(Math.random()*40)+20;
    coins+=reward;
    alert("💰 +"+reward);
  }else{
    let chars=["soldado1","mago1"];
    let newChar=chars[Math.floor(Math.random()*chars.length)];

    if(!skinsUnlocked.includes(newChar)){
      skinsUnlocked.push(newChar);
      localStorage.setItem("skins",JSON.stringify(skinsUnlocked));
      alert("🧙 Nuevo personaje!");
    }else{
      coins+=30;
      alert("Repetido +30");
    }
  }

  localStorage.setItem("coins",coins);
  document.getElementById("coinsText").innerText=coins;
}

// start
function startGame(){
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";

  for(let i=0;i<cols;i++){
    for(let j=0;j<rows;j++) grid[i][j]=0;
  }

  player.x=20; player.y=20;
  bot.x=10; bot.y=10;

  time=40;
  playing=true;
  lastTime=Date.now();

  loop();
}

// pintar
function paint(p,c){
  let x=Math.floor(p.x);
  let y=Math.floor(p.y);
  if(x>=0&&y>=0&&x<cols&&y<rows){
    grid[x][y]=c;
  }
}

// 🤖 BOT MEJORADO
function moveBot(){

  let dx=player.x-bot.x;
  let dy=player.y-bot.y;
  let dist=Math.hypot(dx,dy);

  if(dist<6){
    bot.x+=dx/dist*0.1;
    bot.y+=dy/dist*0.1;
  }else{
    let tx=Math.random()*cols;
    let ty=Math.random()*rows;

    let dx2=tx-bot.x;
    let dy2=ty-bot.y;
    let d2=Math.hypot(dx2,dy2);

    bot.x+=dx2/d2*0.05;
    bot.y+=dy2/d2*0.05;
  }

  bot.x=Math.max(0,Math.min(cols-1.01,bot.x));
  bot.y=Math.max(0,Math.min(rows-1.01,bot.y));
}

// 🎨 personaje
function drawCharacter(x,y,skin){
  let px=x*15;
  let py=y*15;

  if(skin.includes("duende")) ctx.fillStyle="green";
  if(skin.includes("soldado")) ctx.fillStyle="blue";
  if(skin.includes("mago")) ctx.fillStyle="purple";

  ctx.fillRect(px,py,15,15);

  ctx.font="12px Arial";
  ctx.textAlign="center";

  let emoji="";
  if(skin=="duende1") emoji="👺";
  if(skin=="duende2") emoji="😈";
  if(skin=="soldado1") emoji="🪖";
  if(skin=="soldado2") emoji="🤖";
  if(skin=="mago1") emoji="🧙";
  if(skin=="mago2") emoji="👻";

  ctx.fillText(emoji, px+7, py+12);
}

// ⚡ habilidades
function useAbility(){
  if(abilityCD>0) return;

  if(currentSkin.includes("duende")){
    for(let i=-3;i<=3;i++){
      for(let j=-3;j<=3;j++){
        paint({x:player.x+i,y:player.y+j},1);
      }
    }
  }

  if(currentSkin.includes("soldado")){
    for(let i=0;i<10;i++){
      paint({x:player.x+i,y:player.y},1);
    }
  }

  if(currentSkin.includes("mago")){
    player.x=Math.random()*cols;
    player.y=Math.random()*rows;
  }

  abilityCD=17;
}

// draw
function draw(){
  for(let i=0;i<cols;i++){
    for(let j=0;j<rows;j++){
      if(grid[i][j]==1) ctx.fillStyle="#4cc9f0";
      else if(grid[i][j]==2) ctx.fillStyle="#f72585";
      else ctx.fillStyle="#222";
      ctx.fillRect(i*15,j*15,15,15);
    }
  }

  drawCharacter(player.x,player.y,currentSkin);
  drawCharacter(bot.x,bot.y,"soldado1");
}

// loop
function loop(){
  if(!playing) return;

  let now=Date.now();
  let delta=(now-lastTime)/1000;
  lastTime=now;

  // 🔥 suavizado de movimiento
  player.vx += (player.targetVX - player.vx) * 0.2;
  player.vy += (player.targetVY - player.vy) * 0.2;

  player.x+=player.vx;
  player.y+=player.vy;

  player.x=Math.max(0,Math.min(cols-1.01,player.x));
  player.y=Math.max(0,Math.min(rows-1.01,player.y));

  paint(player,1);
  moveBot();
  paint(bot,2);

  draw();

  time-=delta;
  if(abilityCD>0) abilityCD-=delta;

  if(time<=0){
    playing=false;

    let p1=0,p2=0;
    grid.forEach(c=>{
      c.forEach(v=>{
        if(v==1)p1++;
        if(v==2)p2++;
      });
    });

    if(p1>p2){coins+=30; alert("Ganaste +30");}
    else{coins+=10; alert("Perdiste +10");}

    localStorage.setItem("coins",coins);

    document.getElementById("endText").innerText="Fin de partida";
    canvas.style.display="none";
    document.getElementById("endScreen").style.display="flex";
  }

  requestAnimationFrame(loop);
}

// joystick
let joy=document.getElementById("joystick");

joy.addEventListener("touchmove", e=>{
  e.preventDefault();

  let t=e.touches[0];
  let rect=joy.getBoundingClientRect();

  let dx=(t.clientX-rect.left-50)/50;
  let dy=(t.clientY-rect.top-50)/50;

  player.targetVX=dx*player.speed;
  player.targetVY=dy*player.speed;
});

document.addEventListener("touchmove", e=>e.preventDefault(), {passive:false});
</script>

</body>
</html>
