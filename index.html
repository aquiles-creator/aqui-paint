<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paint Arena PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#1e1e2f;
  color:white;
  text-align:center;
  overflow:hidden;
  touch-action:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#560bad;
  color:white;
}

#menu,#charactersMenu,#endScreen{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

canvas{
  display:none;
  background:#111;
  margin:auto;
}

#joystick{
  position:fixed;
  bottom:20px;
  left:20px;
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}

#ability{
  position:fixed;
  bottom:20px;
  right:20px;
  width:80px;
  height:80px;
  background:#f72585;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

.locked{opacity:0.4;}
</style>
</head>

<body>

<div id="menu">
  <h1>🎨 Paint Arena</h1>
  <button onclick="startGame()">Jugar</button>
  <button onclick="openCharacters()">Personaje</button>
</div>

<div id="charactersMenu" style="display:none;">
  <h2>Personajes</h2>
  <div id="skinsContainer"></div>
  <button onclick="backMenu()">⬅ Volver al menú</button>
</div>

<div id="endScreen" style="display:none;">
  <h1 id="endText"></h1>
  <button onclick="location.reload()">Menú</button>
</div>

<canvas id="game"></canvas>
<div id="joystick"></div>
<div id="ability" onclick="useAbility()">⚡</div>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

// 🔥 MAPA MÁS GRANDE
let cols=40,rows=40;
canvas.width=cols*15;
canvas.height=rows*15;

// skins
let skinsUnlocked=JSON.parse(localStorage.getItem("skins"))||["duende1"];
let currentSkin=localStorage.getItem("skin")||"duende1";

// jugador
let player={x:10,y:10,vx:0,vy:0,speed:0.12};
let bot={x:5,y:5};

// grid
let grid=[];
for(let i=0;i<cols;i++){
  grid[i]=[];
  for(let j=0;j<rows;j++) grid[i][j]=0;
}

let time=40;
let playing=false;
let lastTime=Date.now();
let abilityCD=0;

// 🎮 MENÚ PERSONAJES
function openCharacters(){
  document.getElementById("menu").style.display="none";
  document.getElementById("charactersMenu").style.display="flex";

  let c=document.getElementById("skinsContainer");
  c.innerHTML="";

  let skins=["duende1","duende2","soldado1","soldado2","mago1","mago2"];

  skins.forEach(s=>{
    let div=document.createElement("div");

    let emoji="❓";
    if(s.includes("duende")) emoji="👺";
    if(s.includes("soldado")) emoji="🪖";
    if(s.includes("mago")) emoji="🧙";

    div.innerHTML=`<div style="font-size:40px">${emoji}</div>`;

    if(!skinsUnlocked.includes(s)){
      div.classList.add("locked");
      div.innerHTML+="🔒";
    }else{
      div.onclick=()=>{
        currentSkin=s;
        localStorage.setItem("skin",s);
      }
    }

    c.appendChild(div);
  });
}

function backMenu(){
  document.getElementById("charactersMenu").style.display="none";
  document.getElementById("menu").style.display="flex";
}

// 🎮 START
function startGame(){
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";

  for(let i=0;i<cols;i++){
    for(let j=0;j<rows;j++) grid[i][j]=0;
  }

  player.x=20; player.y=20;
  bot.x=10; bot.y=10;

  time=40;
  playing=true;
  lastTime=Date.now();

  loop();
}

// pintar
function paint(p,c){
  let x=Math.floor(p.x);
  let y=Math.floor(p.y);

  if(x>=0&&y>=0&&x<cols&&y<rows){
    grid[x][y]=c;
  }
}

// 🤖 BOT INTELIGENTE
function moveBot(){

  let best=null;
  let bestScore=-999;

  for(let i=0;i<30;i++){
    let x=Math.floor(Math.random()*cols);
    let y=Math.floor(Math.random()*rows);

    let score=0;

    if(grid[x][y]==0) score+=5;
    if(grid[x][y]==1) score+=3;

    let dist=Math.hypot(x-bot.x,y-bot.y);
    score-=dist*0.3;

    if(score>bestScore){
      bestScore=score;
      best={x,y};
    }
  }

  if(best){
    let dx=best.x-bot.x;
    let dy=best.y-bot.y;
    let d=Math.hypot(dx,dy);

    if(d>0){
      bot.x+=dx/d*0.08;
      bot.y+=dy/d*0.08;
    }
  }

  // límites PERFECTOS
  bot.x=Math.max(0,Math.min(cols-1.01,bot.x));
  bot.y=Math.max(0,Math.min(rows-1.01,bot.y));
}

// 🎨 PERSONAJES
function drawCharacter(x,y,skin){
  let px=x*15;
  let py=y*15;

  if(skin.includes("duende")) ctx.fillStyle="green";
  if(skin.includes("soldado")) ctx.fillStyle="blue";
  if(skin.includes("mago")) ctx.fillStyle="purple";

  ctx.fillRect(px,py,15,15);

  ctx.font="12px Arial";
  ctx.textAlign="center";

  let emoji="";

  if(skin=="duende1") emoji="👺";
  if(skin=="duende2") emoji="😈";
  if(skin=="soldado1") emoji="🪖";
  if(skin=="soldado2") emoji="🤖";
  if(skin=="mago1") emoji="🧙";
  if(skin=="mago2") emoji="👻";

  ctx.fillText(emoji, px+7, py+12);
}

// ⚡ HABILIDADES
function useAbility(){
  if(abilityCD>0) return;

  let type=currentSkin;

  // duende: área
  if(type.includes("duende")){
    for(let i=-3;i<=3;i++){
      for(let j=-3;j<=3;j++){
        paint({x:player.x+i,y:player.y+j},1);
      }
    }
  }

  // soldado: línea
  if(type.includes("soldado")){
    for(let i=0;i<10;i++){
      paint({x:player.x+i,y:player.y},1);
    }
  }

  // mago: teletransporte + pintar
  if(type.includes("mago")){
    player.x=Math.random()*cols;
    player.y=Math.random()*rows;
  }

  abilityCD=17;
}

// draw
function draw(){
  for(let i=0;i<cols;i++){
    for(let j=0;j<rows;j++){
      if(grid[i][j]==1) ctx.fillStyle="#4cc9f0";
      else if(grid[i][j]==2) ctx.fillStyle="#f72585";
      else ctx.fillStyle="#222";
      ctx.fillRect(i*15,j*15,15,15);
    }
  }

  drawCharacter(player.x,player.y,currentSkin);
  drawCharacter(bot.x,bot.y,"soldado1");
}

// loop
function loop(){
  if(!playing) return;

  let now=Date.now();
  let delta=(now-lastTime)/1000;
  lastTime=now;

  player.x+=player.vx;
  player.y+=player.vy;

  player.x=Math.max(0,Math.min(cols-1.01,player.x));
  player.y=Math.max(0,Math.min(rows-1.01,player.y));

  paint(player,1);
  moveBot();
  paint(bot,2);

  draw();

  time-=delta;
  if(abilityCD>0) abilityCD-=delta;

  if(time<=0){
    playing=false;
    document.getElementById("endText").innerText="Fin de partida";
    canvas.style.display="none";
    document.getElementById("endScreen").style.display="flex";
  }

  requestAnimationFrame(loop);
}

// joystick
let joy=document.getElementById("joystick");

joy.addEventListener("touchmove", e=>{
  e.preventDefault();

  let t=e.touches[0];
  let rect=joy.getBoundingClientRect();

  let dx=(t.clientX-rect.left-50)/50;
  let dy=(t.clientY-rect.top-50)/50;

  player.vx=dx*player.speed;
  player.vy=dy*player.speed;
});

document.addEventListener("touchmove", e=>e.preventDefault(), {passive:false});
</script>

</body>
</html>
