<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paint Arena</title>

<style>
html, body {
  margin:0;
  font-family:Arial;
  background:#1e1e2f;
  color:white;
  text-align:center;
  touch-action:none;
  overflow:hidden;
  user-select:none;
}

#menu, #endScreen {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

button {
  padding:12px;
  margin:8px;
  background:#560bad;
  color:white;
  border:none;
  border-radius:10px;
}

canvas { display:none; background:#111; margin:auto; }

#hud { display:none; }

#joystick {
  position:fixed;
  bottom:20px;
  left:20px;
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}

#ability {
  position:fixed;
  bottom:20px;
  right:20px;
  width:80px;
  height:80px;
  background:#f72585;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

#message {
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:#000a;
  padding:10px 20px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>🎨 Paint Arena</h1>
  <p>Monedas: <span id="coins">0</span></p>
  <button onclick="startGame()">Jugar</button>
</div>

<!-- FIN -->
<div id="endScreen" style="display:none;">
  <h1 id="endText"></h1>
  <button onclick="goMenu()">Volver al menú</button>
</div>

<!-- HUD -->
<div id="hud">
  <p id="score"></p>
</div>

<div id="message"></div>

<canvas id="game"></canvas>

<div id="joystick"></div>
<div id="ability" onclick="useAbility()">⚡</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let cols=30, rows=30;
canvas.width = cols*20;
canvas.height = rows*20;

// monedas
let coins = parseInt(localStorage.getItem("coins")) || 0;
document.getElementById("coins").innerText = coins;

// mapa
let grid=[];
for(let i=0;i<cols;i++){
  grid[i]=[];
  for(let j=0;j<rows;j++) grid[i][j]=0;
}

// jugador y bot
let player = {x:10,y:10,speed:0.08};
let bot = {x:5,y:5};

let time=30;
let lastTime=Date.now();
let playing=false;

// mensaje
function showMessage(text){
  let m=document.getElementById("message");
  m.innerText=text;
  m.style.display="block";
  setTimeout(()=>m.style.display="none",2000);
}

// iniciar
function startGame(){
  document.getElementById("menu").style.display="none";
  document.getElementById("endScreen").style.display="none";
  canvas.style.display="block";
  document.getElementById("hud").style.display="block";

  // reset mapa
  for(let i=0;i<cols;i++){
    for(let j=0;j<rows;j++){
      grid[i][j]=0;
    }
  }

  player.x=10; player.y=10;
  bot.x=5; bot.y=5;

  time=30;
  playing=true;
  lastTime=Date.now();

  loop();
}

// volver al menú
function goMenu(){
  location.reload();
}

// pintar
function paint(p,color){
  let x=Math.floor(p.x);
  let y=Math.floor(p.y);

  if(x>=0&&y>=0&&x<cols&&y<rows){
    grid[x][y]=color;
  }
}

// 🤖 BOT MEJORADO (NO TE SIGUE)
function moveBot(){

  let target = null;

  // buscar casillas vacías cerca
  for(let i=0;i<10;i++){
    let x = Math.floor(bot.x + (Math.random()*6 - 3));
    let y = Math.floor(bot.y + (Math.random()*6 - 3));

    if(x>=0 && y>=0 && x<cols && y<rows){
      if(grid[x][y] === 0){
        target = {x,y};
        break;
      }
    }
  }

  // si no encuentra → robar jugador
  if(!target){
    for(let i=0;i<10;i++){
      let x = Math.floor(bot.x + (Math.random()*6 - 3));
      let y = Math.floor(bot.y + (Math.random()*6 - 3));

      if(x>=0 && y>=0 && x<cols && y<rows){
        if(grid[x][y] === 1){
          target = {x,y};
          break;
        }
      }
    }
  }

  // fallback random
  if(!target){
    target = {
      x: bot.x + (Math.random()*2 - 1),
      y: bot.y + (Math.random()*2 - 1)
    };
  }

  let speed = 0.07;

  if(target.x > bot.x) bot.x += speed;
  if(target.x < bot.x) bot.x -= speed;
  if(target.y > bot.y) bot.y += speed;
  if(target.y < bot.y) bot.y -= speed;

  bot.x = Math.max(0, Math.min(cols-1, bot.x));
  bot.y = Math.max(0, Math.min(rows-1, bot.y));
}

// dibujar
function draw(){
  for(let i=0;i<cols;i++){
    for(let j=0;j<rows;j++){
      if(grid[i][j]==1) ctx.fillStyle="#4cc9f0";
      else if(grid[i][j]==2) ctx.fillStyle="#f72585";
      else ctx.fillStyle="#222";
      ctx.fillRect(i*20,j*20,20,20);
    }
  }

  ctx.fillStyle="lime";
  ctx.fillRect(player.x*20,player.y*20,20,20);

  ctx.fillStyle="red";
  ctx.fillRect(bot.x*20,bot.y*20,20,20);
}

// score
function updateScore(){
  let p1=0,p2=0;

  grid.forEach(col=>{
    col.forEach(c=>{
      if(c==1) p1++;
      if(c==2) p2++;
    });
  });

  document.getElementById("score").innerText =
    "Vos: "+p1+" | Bot: "+p2+" | Tiempo: "+Math.floor(time);

  if(time<=0 && playing){
    playing=false;

    let text="";

    if(p1>p2){
      coins+=30;
      text="🏆 GANASTE +30 monedas";
    } else {
      coins+=10;
      text="💀 PERDISTE +10 monedas";
    }

    localStorage.setItem("coins",coins);

    document.getElementById("endText").innerText=text;

    canvas.style.display="none";
    document.getElementById("hud").style.display="none";
    document.getElementById("endScreen").style.display="flex";
  }
}

// joystick
let joy=document.getElementById("joystick");

joy.addEventListener("touchmove", e=>{
  e.preventDefault();

  let t=e.touches[0];
  let rect=joy.getBoundingClientRect();

  let dx=(t.clientX-rect.left-50)/50;
  let dy=(t.clientY-rect.top-50)/50;

  player.x+=dx*player.speed*2;
  player.y+=dy*player.speed*2;

  player.x=Math.max(0,Math.min(cols-1,player.x));
  player.y=Math.max(0,Math.min(rows-1,player.y));
});

// habilidad
function useAbility(){
  for(let i=-2;i<=2;i++){
    for(let j=-2;j<=2;j++){
      let x=Math.floor(player.x+i);
      let y=Math.floor(player.y+j);

      if(x>=0&&y>=0&&x<cols&&y<rows){
        grid[x][y]=1;
      }
    }
  }

  showMessage("⚡ Habilidad!");
}

// loop
function loop(){
  if(!playing) return;

  let now=Date.now();
  let delta=(now-lastTime)/1000;
  lastTime=now;

  paint(player,1);
  moveBot();
  paint(bot,2);

  draw();
  updateScore();

  time-=delta;

  requestAnimationFrame(loop);
}

// bloquear scroll
document.addEventListener("touchmove", e=>e.preventDefault(), {passive:false});
</script>

</body>
</html>
