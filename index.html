<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paint Arena</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg, #1e1e2f, #7209b7);
  color:white;
  text-align:center;
}

#menu {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

button {
  padding:12px;
  margin:8px;
  background:#560bad;
  color:white;
  border:none;
  border-radius:10px;
}

canvas {
  display:none;
  margin:auto;
  background:#111;
}

#hud { display:none; }

#joystick {
  position:fixed;
  bottom:20px;
  left:20px;
  width:100px;
  height:100px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
}

#ability {
  position:fixed;
  bottom:20px;
  right:20px;
  width:80px;
  height:80px;
  background:#f72585;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}

#message {
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:#000a;
  padding:10px 20px;
  border-radius:10px;
  display:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="menu">
  <h1>🎨 Paint Arena</h1>
  <p>Monedas: <span id="coins">0</span></p>

  <button onclick="selectCharacter(1)">Duende ⚡</button>
  <button onclick="selectCharacter(2)">Soldado 🛡️ 🔒</button>
  <button onclick="selectCharacter(3)">Mago 🔮 🔒</button>

  <button onclick="startGame()">Jugar</button>
  <button onclick="openBox()">Abrir sobre (100 🪙)</button>
</div>

<div id="hud">
  <p id="score"></p>
</div>

<div id="message"></div>

<canvas id="game"></canvas>

<div id="joystick"></div>
<div id="ability" onclick="useAbility()">⚡</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let coins = parseInt(localStorage.getItem("coins")) || 0;
document.getElementById("coins").innerText = coins;

let unlocked = JSON.parse(localStorage.getItem("unlocked")) || [1];

let cols=30, rows=30;
canvas.width = cols*20;
canvas.height = rows*20;

let grid=[];
for(let i=0;i<cols;i++){
  grid[i]=[];
  for(let j=0;j<rows;j++) grid[i][j]=0;
}

let player = {x:10,y:10,speed:0.08,power:1,type:1};
let bot = {x:5,y:5};

let time=30;
let lastTime=Date.now();
let abilityCooldown=0;
let boxCost=100;

// mensajes
function showMessage(text){
  let msg=document.getElementById("message");
  msg.innerText=text;
  msg.style.display="block";
  setTimeout(()=>msg.style.display="none",2000);
}

// seleccionar personaje
function selectCharacter(type){
  if(!unlocked.includes(type)){
    showMessage("🔒 Bloqueado");
    return;
  }

  player.type=type;

  if(type==1){ player.speed=0.1; player.power=1;}
  if(type==2){ player.speed=0.06; player.power=2;}
  if(type==3){ player.speed=0.08; player.power=3;}

  showMessage("Personaje listo");
}

// iniciar
function startGame(){
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";
  document.getElementById("hud").style.display="block";
  loop();
}

// pintar
function paint(p,color,power){
  for(let i=-power;i<=power;i++){
    for(let j=-power;j<=power;j++){
      let x=Math.floor(p.x+i);
      let y=Math.floor(p.y+j);
      if(x>=0&&y>=0&&x<cols&&y<rows){
        grid[x][y]=color;
      }
    }
  }
}

// bot inteligente
function moveBot(){
  let tx=bot.x, ty=bot.y;

  for(let i=-2;i<=2;i++){
    for(let j=-2;j<=2;j++){
      let x=bot.x+i;
      let y=bot.y+j;
      if(x>=0&&y>=0&&x<cols&&y<rows){
        if(grid[x][y]!=2){
          tx=x; ty=y;
        }
      }
    }
  }

  if(tx>bot.x) bot.x+=0.1;
  if(tx<bot.x) bot.x-=0.1;
  if(ty>bot.y) bot.y+=0.1;
  if(ty<bot.y) bot.y-=0.1;

  bot.x=Math.max(0,Math.min(cols-1,bot.x));
  bot.y=Math.max(0,Math.min(rows-1,bot.y));
}

// draw
function draw(){
  for(let i=0;i<cols;i++){
    for(let j=0;j<rows;j++){
      if(grid[i][j]==1) ctx.fillStyle="#4cc9f0";
      else if(grid[i][j]==2) ctx.fillStyle="#f72585";
      else ctx.fillStyle="#222";
      ctx.fillRect(i*20,j*20,20,20);
    }
  }

  let px=player.x*20;
  let py=player.y*20;

  ctx.fillStyle = player.type==1 ? "lime" : player.type==2 ? "gray" : "purple";
  ctx.fillRect(px,py,20,20);

  ctx.font="14px Arial";
  ctx.textAlign="center";

  if(player.type==1) ctx.fillText("👺",px+10,py+15);
  if(player.type==2) ctx.fillText("🪖",px+10,py+15);
  if(player.type==3) ctx.fillText("🧙",px+10,py+15);

  ctx.fillStyle="red";
  ctx.fillRect(bot.x*20,bot.y*20,20,20);
}

// score
function updateScore(){
  let p1=0,p2=0;
  grid.forEach(col=>{
    col.forEach(c=>{
      if(c==1) p1++;
      if(c==2) p2++;
    });
  });

  document.getElementById("score").innerText =
    "Vos: "+p1+" | Bot: "+p2+" | Tiempo: "+Math.floor(time);

  if(time<=0){
    if(p1>p2){
      coins+=50;
      showMessage("🏆 GANASTE +50");
    } else {
      coins+=15;
      showMessage("💀 PERDISTE +15");
    }

    localStorage.setItem("coins",coins);
    setTimeout(()=>location.reload(),1500);
  }
}

// joystick
let joy=document.getElementById("joystick");

joy.addEventListener("touchmove", e=>{
  let t=e.touches[0];
  let rect=joy.getBoundingClientRect();

  let dx=(t.clientX-rect.left-50)/50;
  let dy=(t.clientY-rect.top-50)/50;

  player.x+=dx*player.speed*2;
  player.y+=dy*player.speed*2;

  player.x=Math.max(0,Math.min(cols-1,player.x));
  player.y=Math.max(0,Math.min(rows-1,player.y));
});

// habilidad
function useAbility(){
  if(abilityCooldown>0) return;

  if(player.type==2){
    player.x+=2;
  }

  if(player.type==3){
    for(let i=-2;i<=2;i++){
      for(let j=-2;j<=2;j++){
        let x=Math.floor(player.x+i);
        let y=Math.floor(player.y+j);
        if(x>=0&&y>=0&&x<cols&&y<rows){
          grid[x][y]=1;
        }
      }
    }
  }

  abilityCooldown=5;
}

// loop
function loop(){
  let now=Date.now();
  let delta=(now-lastTime)/1000;
  lastTime=now;

  paint(player,1,player.power);
  moveBot();
  paint(bot,2,1);

  draw();
  updateScore();

  time-=delta;
  if(abilityCooldown>0) abilityCooldown-=delta;

  requestAnimationFrame(loop);
}

// sobres
function openBox(){
  if(coins<boxCost){
    showMessage("❌ No tienes monedas");
    return;
  }

  coins-=boxCost;

  let r=Math.random();

  if(r<0.7){
    let reward=Math.floor(Math.random()*40)+20;
    coins+=reward;
    showMessage("💰 +"+reward);
  }
  else if(r<0.9){
    showMessage("🎨 Skin (pronto)");
  }
  else{
    let newChar=Math.floor(Math.random()*2)+2;

    if(!unlocked.includes(newChar)){
      unlocked.push(newChar);
      localStorage.setItem("unlocked",JSON.stringify(unlocked));
      showMessage("🧙 Nuevo personaje!");
    } else {
      coins+=30;
      showMessage("Repetido +30");
    }
  }

  localStorage.setItem("coins",coins);
  document.getElementById("coins").innerText=coins;
}
</script>

</body>
</html>
